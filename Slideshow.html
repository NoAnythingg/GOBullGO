<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* Centers the entire slideshow container perfectly on the screen */
    body {
      margin: 0;
      padding: 20px;
      background-color: #f1efe9;

      /* Flexbox styling to center the box horizontally and vertically */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-x: hidden;

      /* Canvas texture background with soft red blurry paint splatters (no sharp lines) */
      background-image:
        radial-gradient(circle at 20% 25%, rgba(220, 20, 60, 0.18) 0%, rgba(220, 20, 60, 0) 45%),
        radial-gradient(circle at 80% 30%, rgba(139, 0, 0, 0.14) 0%, rgba(139, 0, 0, 0) 40%),
        radial-gradient(circle at 75% 75%, rgba(178, 34, 34, 0.18) 0%, rgba(178, 34, 34, 0) 50%),
        radial-gradient(circle at 45% 60%, rgba(255, 69, 0, 0.08) 0%, rgba(255, 69, 0, 0) 35%),
        linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 4px 4px, 4px 4px;
      background-attachment: fixed;
    }

    /* Slideshow container styled like a picture frame with shadows */
    .slideshow-container {
      width: 100%;
      max-width: 800px;
      position: relative;
      background-color: #fff;
      padding: 15px;
      /* The white border frame around the pictures */
      box-shadow:
        0 4px 8px rgba(0, 0, 0, 0.15),
        0 12px 24px rgba(0, 0, 0, 0.2);
      /* Deep frame shadow */
      border-radius: 4px;
      z-index: 2;
    }

    /* Makes the pictures fill up the frame neatly */
    .slide img {
      display: block;
      width: 100%;
      height: auto;
    }

    .slide {
      display: none;
    }

    .fade {
      animation-name: fade;
      animation-duration: 1.5s;
    }

    @keyframes fade {
      from {
        opacity: .4
      }

      to {
        opacity: 1
      }
    }

    /* Left and right arrow buttons */
    .prev,
    .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      margin-top: -22px;
      padding: 16px;
      color: rgb(69, 3, 3);
      font-weight: bold;
      font-size: 24px;
      transition: 0.6s ease;
      user-select: none;
      background-color: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      line-height: 1;
    }

    .prev {
      left: 25px;
    }

    .next {
      right: 25px;
    }

    .prev:hover,
    .next:hover {
      background-color: rgba(255, 0, 0, 0.8);
      color: white;
    }

    /* Artistic text title font and style on top of the images */
    .text {
      text-align: center;
      padding: 0 0 10px 0;
      font-family: 'Georgia', serif;
      font-style: italic;
      color: #333;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div class="slideshow-container">

    <div class="slide fade">
      <div class="text">Buff squidward</div>
      <img src="./assets/BuffSquidward.jpg" alt="First picture">
    </div>

    <div class="slide fade">
      <div class="text">Spunge bob</div>
      <img src="assets/swagySpungebob.jpg" alt="Second picture">
    </div>

    <div class="slide fade">
      <div class="text">A little wizard</div>
      <img src="assets/littleWizard.jpg" alt="Third picture">
    </div>

    <div class="slide fade">
      <div class="text">A mind reading bear</div>
      <img src="assets/björn.jpg" alt="Third picture">
    </div>

    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>
  </div>

  <script>
    let slideIndex = 1;
    showSlides(slideIndex);

    document.addEventListener("DOMContentLoaded", function () {
      showSlides(slideIndex);
    });

    function plusSlides(n) {
      showSlides(slideIndex += n);
    }

    function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("slide");

      if (n > slides.length) { slideIndex = 1 }
      if (n < 1) { slideIndex = slides.length }

      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }

      slides[slideIndex - 1].style.display = "block";
    }
  </script>
</body>

</html>
